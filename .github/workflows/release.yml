name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build PCM package
        run: |
          DOWNLOAD_URL_BASE="https://github.com/${{ github.repository }}/releases/download"
          python scripts/build_pcm_package.py --download-url-base "$DOWNLOAD_URL_BASE"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/com.lou270.pinout_maker.zip
            dist/metadata.json

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcm-package
          path: |
            dist/com.lou270.pinout_maker.zip
            dist/metadata.json
